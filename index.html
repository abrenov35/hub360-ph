<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>HUB 360 - Pascale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:    #162D49;
      --cream:   #F3EAE2;
      --lavende: #A495C3;
      --white:   #FFFFFF;
      --gray:    #8A8A8A;
      --r: .26s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; font-family: 'Jost', sans-serif; background: var(--navy); }
    body { display: flex; flex-direction: column; }

    /* ─── HEADER ─── */
    header {
      flex-shrink: 0; background: var(--navy);
      padding: 13px 16px 11px; padding-top: max(13px, env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: baseline; gap: 5px; }
    .logo-mark { font-weight: 700; font-size: 17px; color: var(--white); letter-spacing: -.5px; }
    .logo-mark em { display: inline-block; width: 2px; height: 11px; background: var(--lavende); margin: 0 2px; vertical-align: middle; border-radius: 1px; font-style: normal; }
    .logo-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 10px; color: var(--lavende); letter-spacing: 2px; }
    .header-right { display: flex; gap: 7px; align-items: center; }

    .search-wrap { position: relative; }
    .search-input { background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.13); border-radius: 8px; color: var(--white); font-family: 'Jost', sans-serif; font-size: 12px; padding: 7px 10px 7px 27px; outline: none; width: 125px; transition: var(--r); }
    .search-input::placeholder { color: rgba(255,255,255,.36); }
    .search-input:focus { width: 155px; border-color: var(--lavende); background: rgba(255,255,255,.13); }
    .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: .38; pointer-events: none; }

    .btn-icon { background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.11); border-radius: 8px; color: var(--white); cursor: pointer; width: 31px; height: 31px; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: var(--r); }
    .btn-icon:hover { background: rgba(255,255,255,.17); }

    /* ─── SYNC STATUS ─── */
    .sync-bar {
      flex-shrink: 0; height: 3px; background: transparent; transition: var(--r);
    }
    .sync-bar.loading { background: linear-gradient(90deg, var(--lavende), var(--navy), var(--lavende)); background-size: 200%; animation: syncAnim 1.2s linear infinite; }
    .sync-bar.ok { background: #4ade80; }
    .sync-bar.err { background: #f87171; }
    @keyframes syncAnim { 0%{background-position:0%} 100%{background-position:200%} }

    /* ─── BANNIÈRE édition ─── */
    .edit-banner { display: none; flex-shrink: 0; background: var(--lavende); color: white; text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 1px; padding: 5px 16px; }
    body.edit-mode .edit-banner { display: block; }

    /* ─── ZONE ICÔNES ─── */
    .stage { flex: 1; background: var(--cream); border-radius: 20px 20px 0 0; overflow-y: auto; overflow-x: hidden; padding: 16px 14px 8px; -webkit-overflow-scrolling: touch; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 12px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 90px)); gap: 14px 12px; justify-content: start; }
    @media (max-width: 480px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 10px 8px; justify-content: stretch; } }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 48px 16px; opacity: .6; }
    .empty-state .ei { font-size: 30px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; color: var(--navy); line-height: 1.6; }

    /* ─── TUILE ─── */
    .tile { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; animation: pop .3s ease both; }

    .tile-icon { width: 72px; height: 72px; background: var(--white); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(22,45,73,.13); transition: transform var(--r); overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
    @media (max-width: 480px) { .tile-icon { width: 100%; height: auto; aspect-ratio: 1; } }
    .tile-icon img { width: 55%; height: 55%; object-fit: contain; border-radius: 4px; pointer-events: none; }
    .tile-icon:active { transform: scale(.88); }
    body.edit-mode .tile-icon { animation: wiggle .55s ease infinite alternate; cursor: pointer; }

    .tile-del { display: none; position: absolute; top: -5px; right: -2px; width: 21px; height: 21px; background: #e53935; color: white; border: 2px solid var(--cream); border-radius: 50%; font-size: 15px; line-height: 1; cursor: pointer; z-index: 5; align-items: center; justify-content: center; padding: 0; font-weight: 700; }
    body.edit-mode .tile-del { display: flex; }

    .tile-name { font-size: 10px; font-weight: 500; color: var(--navy); text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── BARRE BAS ─── */
    .bottom-bar { flex-shrink: 0; background: var(--cream); display: flex; align-items: center; gap: 8px; padding: 8px 14px; padding-bottom: max(8px, env(safe-area-inset-bottom)); border-top: 1px solid rgba(22,45,73,.07); }
    .btn-add { flex: 1; background: var(--navy); color: var(--white); border: none; border-radius: 10px; padding: 13px 0; font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: var(--r); }
    .btn-add:hover { background: #1e3d63; }
    body.edit-mode .btn-add { display: none; }

    .btn-edit { flex: 1; background: rgba(22,45,73,.08); border: none; border-radius: 10px; padding: 13px 14px; font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 600; color: var(--navy); cursor: pointer; letter-spacing: .5px; white-space: nowrap; transition: var(--r); text-align: center; }
    .btn-edit:hover { background: rgba(22,45,73,.14); }
    body.edit-mode .btn-edit { background: var(--lavende); color: var(--white); font-weight: 700; }

    /* ─── MODALE ─── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(8,18,32,.65); backdrop-filter: blur(6px); z-index: 400; align-items: flex-end; justify-content: center; }
    .overlay.open { display: flex; animation: fadeIn .2s ease; }
    .modal { background: var(--white); border-radius: 22px 22px 0 0; width: 100%; max-width: 520px; padding: 26px 20px 30px; animation: slideUp .26s cubic-bezier(.4,0,.2,1); }
    @media (min-height: 680px) and (min-width: 520px) { .overlay { align-items: center; } .modal { border-radius: 22px; } }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--navy); }
    .modal-close { background: var(--cream); border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--navy); }

    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 5px; }
    .field input { width: 100%; border: 1.5px solid rgba(22,45,73,.15); border-radius: 9px; padding: 10px 12px; font-family: 'Jost', sans-serif; font-size: 14px; color: var(--navy); background: var(--cream); outline: none; transition: var(--r); }
    .field input:focus { border-color: var(--navy); background: var(--white); }
    .field input::placeholder { color: rgba(22,45,73,.28); }

    .icon-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .icon-btn { width: 44px; height: 44px; border-radius: 12px; border: 2.5px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--r); padding: 0; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .icon-btn.selected { border-color: var(--navy); transform: scale(1.12); box-shadow: 0 4px 14px rgba(0,0,0,.22); }

    .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
    .btn-save { flex: 1; background: var(--navy); color: var(--white); border: none; border-radius: 10px; padding: 13px; font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: var(--r); }
    .btn-save:hover { background: #1e3d63; }
    .btn-save:disabled { opacity: .5; cursor: wait; }
    .btn-del-modal { background: #fde8e8; color: #c0392b; border: none; border-radius: 10px; padding: 13px 16px; font-family: 'Jost', sans-serif; font-size: 18px; cursor: pointer; transition: var(--r); }
    .btn-del-modal:hover { background: #f5c0c0; }
    .btn-del-modal.hidden { display: none; }

    /* ─── DARK MODE ─── */
    body.dark { background: #0a1520; }
    body.dark header { background: #0a1520; }
    body.dark .stage { background: #111e2d; }
    body.dark .section-label { color: rgba(232,224,216,.35); }
    body.dark .tile-icon { background: #1a2e44; }
    body.dark .tile-name { color: #c8c0b8; }
    body.dark .tile-del { border-color: #111e2d; }
    body.dark .bottom-bar { background: #111e2d; border-color: rgba(255,255,255,.05); }
    body.dark .btn-edit { background: rgba(255,255,255,.07); color: #c8c0b8; }
    body.dark .modal { background: #1a2e44; }
    body.dark .modal-title { color: #e8e0d8; }
    body.dark .field input { background: #111e2d; border-color: rgba(255,255,255,.12); color: #e8e0d8; }
    body.dark .field input:focus { background: #1a2e44; border-color: var(--lavende); }
    body.dark .icon-btn { box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    body.dark .modal-close { background: #111e2d; color: #e8e0d8; }
    body.dark .empty-state p { color: #c8c0b8; }

    /* ─── ANIMATIONS ─── */
    @keyframes pop { from { opacity: 0; transform: scale(.82); } to { opacity: 1; transform: scale(1); } }
    @keyframes wiggle { from { transform: rotate(-2deg) scale(.97); } to { transform: rotate(2deg) scale(.97); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-mark">HUB<em></em>360</span>
      <span class="logo-sub">Pascale</span>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Rechercher…" autocomplete="off"/>
      </div>
      <button class="btn-icon" id="syncBtn" title="Synchroniser" aria-label="Sync">🔄</button>
      <button class="btn-icon" id="darkToggle" aria-label="Mode sombre">🌙</button>
    </div>
  </header>

  <div class="sync-bar" id="syncBar"></div>
  <div class="edit-banner">✏️ Mode édition — touchez une icône pour la modifier</div>

  <div class="stage">
    <p class="section-label">Mes applications</p>
    <div class="grid" id="sitesGrid"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn-edit" id="editBtn">✏️ Gérer</button>
    <button class="btn-add" id="fabBtn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter une app
    </button>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Nouveau site</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="field">
        <label for="inputName">Nom</label>
        <input id="inputName" type="text" placeholder="ex : Google Drive" maxlength="30"/>
      </div>
      <div class="field">
        <label for="inputUrl">URL</label>
        <input id="inputUrl" type="url" placeholder="https://…"/>
      </div>
      <div class="field">
        <label>Icône</label>
        <div class="icon-row" id="iconRow"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-save" id="saveBtn">Enregistrer</button>
        <button class="btn-del-modal hidden" id="delBtn">🗑️</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // ⚙️ CONFIGURATION — collez ici votre URL Apps Script
    //    après avoir déployé (étape 2 du guide)
    // ═══════════════════════════════════════════════════
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuiIEzgGm-hs8aD9_-6Dbi1q76zRlTKo1TKN6ogJ5EvEiXxeOFo0AfksYbn87wXK5V/exec';

    // ── Icônes SVG premium ──
    const ICONS = [
      { id:'globe',    grad:['#4F8EF7','#1A56DB'], svg:'<circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5" fill="none"/><path d="M12 2a14.5 14.5 0 0 1 4 10 14.5 14.5 0 0 1-4 10A14.5 14.5 0 0 1 8 12 14.5 14.5 0 0 1 12 2z" stroke="white" stroke-width="1.5" fill="none"/><path d="M2 12h20" stroke="white" stroke-width="1.5"/>' },
      { id:'folder',   grad:['#F7A24F','#E06B1A'], svg:'<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'chart',    grad:['#6EE2A0','#1B9E57'], svg:'<path d="M3 3v18h18" stroke="white" stroke-width="1.5" stroke-linecap="round"/><path d="M7 16l4-5 4 3 4-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' },
      { id:'mail',     grad:['#F76E6E','#C0392B'], svg:'<rect x="3" y="5" width="18" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/><path d="M3 7l9 6 9-6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>' },
      { id:'chat',     grad:['#A78BFA','#7C3AED'], svg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'calendar', grad:['#67E8F9','#0891B2'], svg:'<rect x="3" y="4" width="18" height="18" rx="2" stroke="white" stroke-width="1.5" fill="none"/><path d="M16 2v4M8 2v4M3 10h18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>' },
      { id:'cart',     grad:['#FDE68A','#D97706'], svg:'<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="white" stroke-width="1.5" fill="none"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>' },
      { id:'home',     grad:['#6EE7B7','#059669'], svg:'<path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="white" stroke-width="1.5" fill="none"/><path d="M9 21V12h6v9" stroke="white" stroke-width="1.5"/>' },
      { id:'tool',     grad:['#94A3B8','#475569'], svg:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'settings', grad:['#CBD5E1','#64748B'], svg:'<circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.5" fill="none"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'pin',      grad:['#FCA5A5','#DC2626'], svg:'<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z" stroke="white" stroke-width="1.5" fill="none"/><circle cx="12" cy="10" r="3" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'link',     grad:['#93C5FD','#2563EB'], svg:'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>' },
      { id:'photo',    grad:['#F9A8D4','#BE185D'], svg:'<rect x="3" y="3" width="18" height="18" rx="2" stroke="white" stroke-width="1.5" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="white"/><path d="M21 15l-5-5L5 21" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>' },
      { id:'video',    grad:['#86EFAC','#16A34A'], svg:'<rect x="2" y="5" width="15" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/><path d="M17 9l5-3v12l-5-3" stroke="white" stroke-width="1.5" stroke-linejoin="round" fill="none"/>' },
      { id:'book',     grad:['#C4B5FD','#7C3AED'], svg:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'work',     grad:['#FCD34D','#B45309'], svg:'<rect x="2" y="7" width="20" height="14" rx="2" stroke="white" stroke-width="1.5" fill="none"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>' },
      { id:'search',   grad:['#7DD3FC','#0284C7'], svg:'<circle cx="11" cy="11" r="8" stroke="white" stroke-width="1.5" fill="none"/><path d="M21 21l-4.35-4.35" stroke="white" stroke-width="1.5" stroke-linecap="round"/>' },
      { id:'rocket',   grad:['#F472B6','#9D174D'], svg:'<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" stroke="white" stroke-width="1.5" fill="none"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" stroke="white" stroke-width="1.5" fill="none"/>' },
      { id:'star',     grad:['#FDE68A','#F59E0B'], svg:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>' },
      { id:'shield',   grad:['#6EE7B7','#047857'], svg:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="white" stroke-width="1.5" fill="none"/>' },
    ];

    function iconSVG(icon, size = 26) {
      const uid = 'g' + icon.id + size;
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.18))">
        <defs><linearGradient id="${uid}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="${icon.grad[0]}"/>
          <stop offset="100%" stop-color="${icon.grad[1]}"/>
        </linearGradient></defs>
        <rect width="24" height="24" rx="6" fill="url(#${uid})"/>
        ${icon.svg}
      </svg>`;
    }

    let selectedIcon = ICONS[0];
    let editId = null;
    let isEditMode = false;
    let sitesCache = [];

    // ── Sync bar ──
    function syncBar(state) {
      const bar = document.getElementById('syncBar');
      bar.className = 'sync-bar ' + state;
      if (state === 'ok' || state === 'err') setTimeout(() => bar.className = 'sync-bar', 2000);
    }

    // ── API Google Sheets ──
    async function apiCall(params) {
      syncBar('loading');
      try {
        let res, data;
        if (params.action === 'get') {
          res = await fetch(SCRIPT_URL + '?action=get');
          data = await res.json();
        } else {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(params),
            headers: { 'Content-Type': 'text/plain' }
          });
          data = { ok: true };
        }
        syncBar('ok');
        return data;
      } catch(e) {
        console.error(e);
        syncBar('err');
        return null;
      }
    }

    async function loadFromSheet() {
      const r = await apiCall({ action: 'get' });
      if (r && r.sites) {
        sitesCache = r.sites;
        localStorage.setItem('hub360_pascale_sites', JSON.stringify(sitesCache));
      } else {
        try { sitesCache = JSON.parse(localStorage.getItem('hub360_pascale_sites')) || []; } catch { sitesCache = []; }
      }
      render(document.getElementById('searchInput').value);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Rendu grille ──
    function render(q = '') {
      const grid = document.getElementById('sitesGrid');
      let sites = [...sitesCache];
      if (q.trim()) { const lq = q.toLowerCase(); sites = sites.filter(s => s.name.toLowerCase().includes(lq) || s.url.toLowerCase().includes(lq)); }
      sites.sort((a, b) => a.name.localeCompare(b, 'fr'));

      if (!sites.length) {
        grid.innerHTML = `<div class="empty-state"><div class="ei">🔗</div><p>${q ? 'Aucun résultat.' : 'Aucune application enregistrée.<br>Appuyez sur <strong>Ajouter</strong>.'}</p></div>`;
        return;
      }

      grid.innerHTML = sites.map((s, i) => {
        const icon = ICONS.find(ic => ic.id === s.iconId) || ICONS[0];
        return `<div class="tile" style="animation-delay:${i*.04}s">
          <div class="tile-icon" data-id="${esc(s.id)}" data-url="${esc(s.url)}" id="fav-${esc(s.id)}">${iconSVG(icon, 36)}</div>
          <button class="tile-del" data-id="${esc(s.id)}" aria-label="Supprimer">−</button>
          <div class="tile-name">${esc(s.name)}</div>
        </div>`;
      }).join('');

      // favicons auto
      sites.forEach(s => {
        try {
          const root = new URL(s.url).origin;
          const img = new Image();
          img.onload = () => { const el = document.getElementById('fav-'+s.id); if(el) el.innerHTML = `<img src="${img.src}" alt="" style="width:55%;height:55%;object-fit:contain;border-radius:4px;"/>`; };
          img.src = root + '/favicon.ico';
        } catch {}
      });
    }

    // ── Clic tuile ──
    document.getElementById('sitesGrid').addEventListener('click', e => {
      const delBtn = e.target.closest('.tile-del');
      if (delBtn) { e.stopPropagation(); deleteSite(delBtn.dataset.id); return; }
      const icon = e.target.closest('.tile-icon');
      if (!icon) return;
      if (isEditMode) { const site = sitesCache.find(s => s.id === icon.dataset.id); if (site) openModal(site); }
      else { const url = icon.dataset.url; if (url) window.open(url, '_blank', 'noopener,noreferrer'); }
    });

    // ── Supprimer ──
    async function deleteSite(id) {
      if (!confirm('Supprimer ce site ?')) return;
      sitesCache = sitesCache.filter(s => s.id !== id);
      localStorage.setItem('hub360_pascale_sites', JSON.stringify(sitesCache));
      render(document.getElementById('searchInput').value);
      await apiCall({ action: 'delete', id });
    }

    // ── Mode édition ──
    document.getElementById('editBtn').addEventListener('click', () => {
      isEditMode = !isEditMode;
      document.body.classList.toggle('edit-mode', isEditMode);
      document.getElementById('editBtn').textContent = isEditMode ? '✅ Terminer' : '✏️ Gérer';
    });

    // ── Modale ──
    function openModal(site = null) {
      editId = site ? site.id : null;
      document.getElementById('modalTitle').textContent = site ? 'Modifier' : 'Nouveau site';
      document.getElementById('inputName').value = site ? site.name : '';
      document.getElementById('inputUrl').value  = site ? site.url  : '';
      selectedIcon = site ? (ICONS.find(ic => ic.id === site.iconId) || ICONS[0]) : ICONS[0];
      document.getElementById('delBtn').classList.toggle('hidden', !site);
      buildIcons();
      document.getElementById('overlay').classList.add('open');
      setTimeout(() => document.getElementById('inputName').focus(), 120);
    }
    function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; }

    // ── Enregistrer ──
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const name = document.getElementById('inputName').value.trim();
      let   url  = document.getElementById('inputUrl').value.trim();
      if (!name) { alert('Nom requis.'); return; }
      if (!url)  { alert('URL requise.'); return; }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = '…';

      if (editId) {
        const i = sitesCache.findIndex(s => s.id === editId);
        if (i !== -1) sitesCache[i] = { ...sitesCache[i], name, url, iconId: selectedIcon.id };
        await apiCall({ action: 'update', id: editId, name, url, iconId: selectedIcon.id });
      } else {
        const newId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        sitesCache.push({ id: newId, name, url, iconId: selectedIcon.id });
        await apiCall({ action: 'add', id: newId, name, url, iconId: selectedIcon.id });
      }

      localStorage.setItem('hub360_pascale_sites', JSON.stringify(sitesCache));
      btn.disabled = false; btn.textContent = 'Enregistrer';
      closeModal();
      render(document.getElementById('searchInput').value);
    });

    // ── Supprimer depuis modale ──
    document.getElementById('delBtn').addEventListener('click', async () => {
      if (!editId || !confirm('Supprimer ?')) return;
      sitesCache = sitesCache.filter(s => s.id !== editId);
      localStorage.setItem('hub360_pascale_sites', JSON.stringify(sitesCache));
      closeModal();
      render(document.getElementById('searchInput').value);
      await apiCall({ action: 'delete', id: editId });
    });

    // ── Icon picker ──
    function buildIcons() {
      document.getElementById('iconRow').innerHTML = ICONS.map(ic =>
        `<button class="icon-btn${ic.id===selectedIcon.id?' selected':''}" onclick="pickIcon('${ic.id}')" type="button">${iconSVG(ic,24)}</button>`
      ).join('');
    }
    function pickIcon(id) { selectedIcon = ICONS.find(ic=>ic.id===id)||ICONS[0]; buildIcons(); }

    // ── Dark mode ──
    const dt = document.getElementById('darkToggle');
    function applyDark(on) { document.body.classList.toggle('dark',on); dt.textContent=on?'☀️':'🌙'; localStorage.setItem('hub360_pascale_dark',on?'1':'0'); }
    dt.addEventListener('click', () => applyDark(!document.body.classList.contains('dark')));
    if (localStorage.getItem('hub360_pascale_dark')==='1') applyDark(true);

    // ── Recherche ──
    document.getElementById('searchInput').addEventListener('input', e => render(e.target.value));

    // ── Sync manuel ──
    document.getElementById('syncBtn').addEventListener('click', loadFromSheet);

    // ── Événements modale ──
    document.getElementById('fabBtn').addEventListener('click', () => openModal());
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) closeModal(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
    ['inputName','inputUrl'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('saveBtn').click(); }));

    // ── Init ──
    buildIcons();
    loadFromSheet();
  </script>
</body>
</html>
